<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账单详情 - 三国支付</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f4f8;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
            padding: 40px 35px;
        }
        .header {
            text-align: center;
            padding-bottom: 25px;
            border-bottom: 3px solid #eef2f7;
            margin-bottom: 30px;
        }
        .header h1 { color: #1a2332; font-size: 32px; font-weight: 800; }
        .header .sub { color: #7a8a9e; font-size: 14px; margin-top: 8px; }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            background: #f7f9fc;
            border-radius: 16px;
            padding: 20px 25px;
            margin-bottom: 30px;
        }
        .summary-item { text-align: center; }
        .summary-item .label { font-size: 12px; color: #7a8a9e; font-weight: 500; }
        .summary-item .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
        .value.income { color: #0e8345; }
        .value.expense { color: #d93025; }
        .value.pending { color: #1a73e8; }
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a2332;
            margin: 28px 0 16px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #eef2f7;
        }
        .bill-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 8px;
            background: #fafbfc;
            border: 1px solid #f0f2f5;
        }
        .bill-item .left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .bill-item .time { color: #7a8a9e; font-size: 14px; font-weight: 500; min-width: 70px; }
        .bill-item .target { color: #1a2332; font-weight: 600; font-size: 15px; }
        .bill-item .detail { color: #7a8a9e; font-size: 13px; background: #f0f2f5; padding: 2px 12px; border-radius: 6px; }
        .bill-item .amount { font-weight: 700; font-size: 16px; padding: 4px 16px; border-radius: 8px; }
        .bill-item .amount.income { color: #0e8345; background: #e6f4ea; }
        .bill-item .amount.expense { color: #d93025; background: #fce8e6; }
        .empty { text-align: center; color: #7a8a9e; padding: 30px 0; font-size: 15px; }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid #eef2f7;
            color: #9aabbe;
            font-size: 13px;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            background: #f7f9fc;
            border-radius: 14px;
            padding: 16px 22px;
            margin-top: 20px;
            border: 1px solid #eef2f7;
        }
        .stats-row .item { font-size: 14px; color: #1a2332; }
        .stats-row .item strong { font-weight: 700; }
        .print-btn {
            display: block;
            width: 220px;
            margin: 25px auto 0;
            background: #1a2332;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .print-btn:hover { background: #2d3a4f; }
        .loading { text-align: center; padding: 50px 0; color: #7a8a9e; font-size: 16px; }
        .error { text-align: center; padding: 50px 0; color: #d93025; font-size: 16px; }
        @media (max-width: 700px) {
            .container { padding: 20px 15px; }
            .summary-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media print { .print-btn { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 账单详情</h1>
            <div class="sub" id="generatedTime">三国支付 · 账单系统</div>
        </div>

        <div id="content">
            <div class="loading">⏳ 加载账单数据中...</div>
        </div>

        <div class="footer">三国支付 · 账单系统</div>
    </div>

    <script>
        function formatNumber(num) {
            return num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function formatMoney(num) {
            return num.toFixed(2);
        }

        function renderBill(data) {
            const content = document.getElementById('content');
            
            // 汇总卡片
            let html = `
                <div class="summary-grid">
                    <div class="summary-item">
                        <div class="label">📈 总入款</div>
                        <div class="value income">${formatNumber(data.total_income_raw)}<br><span style="font-size:14px;color:#7a8a9e;">${formatMoney(data.total_income_usd)}U</span></div>
                    </div>
                    <div class="summary-item">
                        <div class="label">📉 总下发</div>
                        <div class="value expense">${formatMoney(data.total_expense)}U</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">📊 未下发</div>
                        <div class="value pending">${formatMoney(data.pending_usd)}U</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">💱 汇率</div>
                        <div class="value">${data.rate}</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">📊 费率</div>
                        <div class="value">${data.fee}%</div>
                    </div>
                </div>
            `;

            // 入款记录
            if (data.income && data.income.length > 0) {
                html += `<div class="section-title">📈 入款记录（${data.income.length}笔）</div>`;
                for (const item of data.income) {
                    html += `
                        <div class="bill-item">
                            <div class="left">
                                <span class="time">${item.time}</span>
                                <span class="target">${item.target}</span>
                                <span class="detail">${formatNumber(item.raw_amount)} / ${item.rate} * (${(1 - item.fee/100).toFixed(2)})</span>
                            </div>
                            <span class="amount income">+${formatMoney(item.amount)}U</span>
                        </div>
                    `;
                }
            } else {
                html += `<div class="empty">📭 暂无入款记录</div>`;
            }

            // 下发记录
            if (data.expense && data.expense.length > 0) {
                html += `<div class="section-title">📉 下发记录（${data.expense.length}笔）</div>`;
                for (const item of data.expense) {
                    html += `
                        <div class="bill-item">
                            <div class="left">
                                <span class="time">${item.time}</span>
                                <span class="target">${item.target}</span>
                            </div>
                            <span class="amount expense">-${formatMoney(item.amount)}U</span>
                        </div>
                    `;
                }
            } else {
                html += `<div class="empty">📭 暂无下发记录</div>`;
            }

            // 底部统计
            html += `
                <div class="stats-row">
                    <span class="item">📈 总入款：<strong>${formatNumber(data.total_income_raw)}</strong>（<strong>${formatMoney(data.total_income_usd)}</strong>U）</span>
                    <span class="item">📉 总下发：<strong>${formatMoney(data.total_expense)}</strong>U</span>
                    <span class="item">📊 未下发：<strong>${formatMoney(data.pending_usd)}</strong>U</span>
                </div>
                <button class="print-btn" onclick="window.print()">🖨️ 打印 / 保存PDF</button>
            `;

            content.innerHTML = html;
            document.getElementById('generatedTime').textContent = `生成时间: ${new Date().toLocaleString()}`;
        }

        // 解析URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('data');

        if (encodedData) {
            try {
                const jsonStr = decodeURIComponent(encodedData);
                const data = JSON.parse(jsonStr);
                renderBill(data);
            } catch (e) {
                document.getElementById('content').innerHTML = `<div class="error">❌ 数据解析失败，请重新生成账单</div>`;
            }
        } else {
            document.getElementById('content').innerHTML = `<div class="error">❌ 未找到账单数据，请在群组中发送「账单网页」生成</div>`;
        }
    </script>
</body>
</html>
