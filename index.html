<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 完整账单查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 20px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; background: #1a1a2e; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { color: #4fc3f7; text-align: center; font-size: 28px; border-bottom: 2px solid #4fc3f7; padding-bottom: 16px; margin-bottom: 20px; }
        .period-tabs { display: flex; gap: 10px; margin-bottom: 24px; justify-content: center; flex-wrap: wrap; }
        .period-tab { padding: 10px 30px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; background: #2a2a4a; color: #888; }
        .period-tab:hover { background: #3a3a5a; color: #fff; }
        .period-tab.active { background: #4fc3f7; color: #0f0f1a; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; background: rgba(79,195,247,0.08); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 12px; color: #78909c; }
        .stat-value { font-size: 18px; font-weight: bold; margin-top: 4px; }
        .stat-value.green { color: #66bb6a; }
        .stat-value.red { color: #ef5350; }
        .stat-value.blue { color: #4fc3f7; }
        .section { margin: 16px 0; }
        .section-title { color: #ffd54f; font-size: 16px; font-weight: bold; padding: 8px 12px; background: rgba(255,213,79,0.1); border-radius: 8px; margin-bottom: 10px; }
        .record { padding: 8px 14px; margin: 4px 0; background: rgba(255,255,255,0.04); border-radius: 6px; font-size: 14px; display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; }
        .record-deposit { border-left: 3px solid #66bb6a; }
        .record-withdraw { border-left: 3px solid #ef5350; }
        .record-time { color: #78909c; font-size: 12px; }
        .record-amount { font-weight: bold; }
        .record-amount.green { color: #66bb6a; }
        .record-amount.red { color: #ef5350; }
        .record-user { color: #90a4ae; font-size: 13px; }
        .empty { color: #78909c; text-align: center; padding: 20px; }
        .footer { text-align: center; color: #78909c; font-size: 12px; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 16px; }
        .error { text-align: center; padding: 40px; color: #ef5350; }
        .record-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .period-tab { padding: 8px 16px; font-size: 14px; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .record { font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 完整账单</h1>
    
    <div class="period-tabs">
        <button class="period-tab active" data-period="今日">📅 今日</button>
        <button class="period-tab" data-period="本周">📅 本周</button>
        <button class="period-tab" data-period="本月">📅 本月</button>
    </div>
    
    <div id="stats" class="stats">
        <div class="stat-item"><div class="stat-label">📥 总入款</div><div class="stat-value green" id="totalDeposit">-</div></div>
        <div class="stat-item"><div class="stat-label">📤 已下发</div><div class="stat-value red" id="totalWithdraw">-</div></div>
        <div class="stat-item"><div class="stat-label">💰 余额</div><div class="stat-value blue" id="balance">-</div></div>
        <div class="stat-item"><div class="stat-label">💱 汇率</div><div class="stat-value blue" id="exchange">-</div></div>
        <div class="stat-item"><div class="stat-label">📊 费率</div><div class="stat-value blue" id="rate">-</div></div>
    </div>
    
    <div id="depositsSection" class="section">
        <div class="section-title">📥 入款记录 (<span id="depositCount">0</span>笔)</div>
        <div id="depositList"></div>
    </div>
    
    <div id="withdrawsSection" class="section">
        <div class="section-title">📤 下发记录 (<span id="withdrawCount">0</span>笔)</div>
        <div id="withdrawList"></div>
    </div>
    
    <div class="footer">
        <span id="footerTime">加载中...</span>
    </div>
</div>

<script>
// 从URL参数获取数据
function getDataFromURL() {
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get('data');
    if (!dataParam) {
        return null;
    }
    try {
        // 先尝试 base64 解码
        let jsonStr = dataParam;
        try {
            // 尝试 base64 解码
            const decoded = atob(decodeURIComponent(dataParam));
            jsonStr = decoded;
        } catch(e) {
            // 如果不是 base64，尝试直接 URL 解码
            jsonStr = decodeURIComponent(dataParam);
        }
        const data = JSON.parse(jsonStr);
        return data;
    } catch (e) {
        console.error('解析数据失败:', e);
        return null;
    }
}

// 渲染账单
function renderBill(period) {
    const allData = getDataFromURL();
    if (!allData) {
        document.getElementById('depositList').innerHTML = '<div class="error">❌ 未找到账单数据，请重新从机器人获取链接</div>';
        document.getElementById('withdrawList').innerHTML = '';
        document.getElementById('totalDeposit').textContent = '0';
        document.getElementById('totalWithdraw').textContent = '0U';
        document.getElementById('balance').textContent = '0U';
        document.getElementById('exchange').textContent = '-';
        document.getElementById('rate').textContent = '-';
        return;
    }
    
    // 获取所有记录
    let allDeposits = allData.deposits || [];
    let allWithdraws = allData.withdraws || [];
    
    // 根据周期筛选（简单处理：全部显示，因为数据已经是按周期传过来的）
    let deposits = allDeposits;
    let withdraws = allWithdraws;
    
    // 更新统计
    document.getElementById('totalDeposit').textContent = allData.totalDepositRaw || '0';
    document.getElementById('totalWithdraw').textContent = (allData.totalWithdraw || 0).toFixed(2) + 'U';
    document.getElementById('balance').textContent = (allData.balance || 0).toFixed(2) + 'U';
    document.getElementById('exchange').textContent = allData.exchange || '1';
    document.getElementById('rate').textContent = (allData.rate || 0) + '%';
    
    // 更新计数
    document.getElementById('depositCount').textContent = deposits.length;
    document.getElementById('withdrawCount').textContent = withdraws.length;
    
    // 渲染入款
    const depositList = document.getElementById('depositList');
    if (deposits.length === 0) {
        depositList.innerHTML = '<div class="empty">暂无入款记录</div>';
    } else {
        depositList.innerHTML = deposits.map(r => `
            <div class="record record-deposit">
                <div class="record-left">
                    <span class="record-time">${r.time || ''}</span>
                    <span>+${r.raw_display || r.raw_amount || 0}</span>
                </div>
                <span class="record-amount green">${r.amount ? r.amount.toFixed(2) : '0'}U</span>
                <span class="record-user">${r.username || '未知用户'}</span>
            </div>
        `).join('');
    }
    
    // 渲染下发
    const withdrawList = document.getElementById('withdrawList');
    if (withdraws.length === 0) {
        withdrawList.innerHTML = '<div class="empty">暂无下发记录</div>';
    } else {
        withdrawList.innerHTML = withdraws.map(r => `
            <div class="record record-withdraw">
                <div class="record-left">
                    <span class="record-time">${r.time || ''}</span>
                    <span>下发</span>
                </div>
                <span class="record-amount red">-${r.amount ? r.amount.toFixed(2) : '0'}U</span>
                <span class="record-user">${r.username || '未知用户'}</span>
            </div>
        `).join('');
    }
    
    document.getElementById('footerTime').textContent = '📅 ' + new Date().toLocaleString() + ' · 共 ' + (deposits.length + withdraws.length) + ' 条记录';
}

// 切换周期
document.querySelectorAll('.period-tab').forEach(tab => {
    tab.addEventListener('click', function() {
        document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const period = this.dataset.period;
        renderBill(period);
    });
});

// 初始化
document.addEventListener('DOMContentLoaded', function() {
    renderBill('今日');
});
</script>
</body>
</html>
